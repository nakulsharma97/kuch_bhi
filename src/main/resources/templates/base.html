<!DOCTYPE html>
<!-- npx tailwindcss -i ./src/main/resources/static/css/input.css -o ./src/main/resources/static/css/output.css -->
<html class="light" lang="en" 
 th:fragment="parent(content,title,script)" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Base Page</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="dark:bg-gray-900 dark:text-white">

    <!--common header-->
    <!--navbar-->
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="p-4 ">
        <section th:replace="${content}">
        </section>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script data-th-src="@{/js/script.js}"></script>
<th:block data-th-replace="${script}">  </th:block>

</body>

</html>
