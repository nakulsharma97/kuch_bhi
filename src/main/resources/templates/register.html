<!doctype html>

<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>Sign Up Page</title>
  </head>

  <body>
    <div id="content">
      <div class="flex justify-center items-start mt-10">
        <div
          class="w-full max-w-md p-8 bg-white border border-gray-200 rounded-lg shadow dark:bg-gray-800"
        >
          <h2
            class="text-2xl font-bold text-center text-gray-900 dark:text-white mb-6"
          >
            Create Account
          </h2>

          <form 
          data-th-action="@{/register}" method="post"
          data-th-object="${userForm}"
          class="flex flex-col gap-4">
            <!-- Username -->
            <div>
              <label
                class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300"
              >
                Username
              </label>
              <input
                type="text"
                id="name"
                th:field="*{name}"
                placeholder="Enter username"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white"
              />
            </div>

            <!-- Email -->
            <div>
              <label
                class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300"
              >
                Email
              </label>
              <input
                type="email"
                id="email"
                th:field="*{email}"
                placeholder="Enter email"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white"
              />
            </div>

            <!-- Password -->
            <div>
              <label
                class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300"
              >
                New Password
              </label>
              <input
                type="password"
                id="password"
                th:field="*{password}"
                placeholder="Enter password"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white"
              />
            </div>

            <!-- Contact -->
            <div>
              <label
                class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300"
              >
                Contact Number
              </label>
              <input
                type="text"
                id="contact"
                th:field="*{phoneNumber}"
                placeholder="Enter contact number"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white"
              />
            </div>

            <!-- About -->
            <div>
              <label
                class="block mb-1 text-sm font-medium text-gray-700 dark:text-gray-300"
              >
                About You
              </label>
              <textarea
              data-th-field="*{about}"
                rows="3"
                placeholder="Write about yourself"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-gray-700 dark:text-white"
              ></textarea>
            </div>

            <!-- Button -->
             <div class="mb-3 flex justify-center space-x-3">
            <button
              type="submit"
              class="px-3 py-2 mt-2 w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
            >
              Sign Up
            </button>
            <button
              type="reset"
              class="px-3 py-2 mt-2 w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
            >
              Reset
            </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      console.log("Signup page loaded");
    </script>
  </body>
</html>
